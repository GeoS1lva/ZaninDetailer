name: zanin_detailer
description: "Aplicativo de gestão e agendamento - Zanin Detailer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.2.0
  get_it: ^7.7.0
  fpdart: ^1.1.0
  injectable: ^2.4.0
  dio: ^5.9.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.2
  flutter_secure_storage: ^10.3.1
  dartz: ^0.10.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo Vectorizada.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Logo Vectorizada.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/